<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Ask Flora</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --green-deep: #2D5A3D;
  --green-mid: #5B8C6A;
  --green-sage: #8FB09A;
  --green-pale: #C5D8CC;
  --green-lightest: #E8F0EB;
  --cream: #FAF6F0;
  --cream-dark: #F0E8DB;
  --cream-mid: #E8DCCC;
  --brown-warm: #8B7355;
  --brown-dark: #5C4A32;
  --text-dark: #2C3E2D;
  --text-mid: #4A6350;
  --text-light: #6B8570;
  --white: #FFFFFF;
  --shadow-soft: 0 2px 12px rgba(45,90,61,0.08);
  --shadow-mid: 0 4px 20px rgba(45,90,61,0.12);
}

html, body {
  height: 100%;
  font-family: 'Nunito', sans-serif;
  background: var(--cream);
  color: var(--text-dark);
  overflow: hidden;
}

/* ── Layout ── */
.app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  background: var(--cream);
  position: relative;
}

/* ── Header ── */
.header {
  background: linear-gradient(180deg, var(--cream-dark) 0%, var(--cream) 100%);
  padding: 16px 20px 12px;
  text-align: center;
  flex-shrink: 0;
  border-bottom: 1px solid var(--cream-mid);
  position: relative;
}

.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--green-deep);
  letter-spacing: 0.5px;
}

.snap-btn {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: 1.5px solid var(--green-pale);
  color: var(--green-mid);
  font-family: 'Nunito', sans-serif;
  font-size: 13px;
  font-weight: 600;
  padding: 6px 12px;
  border-radius: 16px;
  cursor: pointer;
  transition: all 0.15s;
  display: none;
}

.chat-container.active ~ .header .snap-btn,
.snap-btn.visible { display: inline-block; }

.snap-btn:hover { background: var(--green-lightest); border-color: var(--green-mid); }

.reset-btn {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: 1.5px solid var(--green-pale);
  color: var(--green-mid);
  font-family: 'Nunito', sans-serif;
  font-size: 13px;
  font-weight: 600;
  padding: 6px 12px;
  border-radius: 16px;
  cursor: pointer;
  transition: all 0.15s;
}

.reset-btn:hover { background: var(--green-lightest); border-color: var(--green-mid); }

/* ── Welcome Screen ── */
.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  padding: 40px 30px;
  text-align: center;
  animation: fadeIn 0.6s ease;
}

.welcome-avatar {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: var(--green-mid);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 24px;
  box-shadow: var(--shadow-mid);
  position: relative;
  overflow: hidden;
}

.welcome-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.welcome h2 {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  color: var(--green-deep);
  margin-bottom: 12px;
}

.welcome p {
  font-size: 17px;
  color: var(--text-mid);
  line-height: 1.6;
  max-width: 320px;
  margin-bottom: 32px;
}

.start-btn {
  background: var(--green-deep);
  color: var(--white);
  border: 2px solid var(--green-deep);
  padding: 14px 0;
  border-radius: 30px;
  font-family: 'Nunito', sans-serif;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: var(--shadow-mid);
  letter-spacing: 0.5px;
  width: 240px;
}

.start-btn:hover { background: #1E4A2E; border-color: #1E4A2E; transform: translateY(-1px); }
.start-btn:active { transform: translateY(0); }

.plantid-welcome-btn {
  background: none;
  color: var(--green-deep);
  border: 2px solid var(--green-deep);
  padding: 14px 0;
  border-radius: 30px;
  font-family: 'Nunito', sans-serif;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 12px;
  letter-spacing: 0.5px;
  width: 240px;
}

.plantid-welcome-btn:hover { background: var(--green-lightest); }

.plantid-btn:hover { background: var(--green-pale); }

/* ── Chat Area ── */
.chat-container {
  display: none;
  flex-direction: column;
  flex: 1;
  min-height: 0;
}

.chat-container.active {
  display: flex;
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px 16px 8px;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}

.message {
  display: flex;
  margin-bottom: 12px;
  animation: msgIn 0.3s ease;
}

.message.flora {
  justify-content: flex-start;
  gap: 8px;
}

.flora-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  overflow: hidden;
  flex-shrink: 0;
  align-self: flex-end;
}

.flora-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.message.user {
  justify-content: flex-end;
}

.bubble {
  max-width: 82%;
  padding: 12px 16px;
  border-radius: 18px;
  font-size: 16px;
  line-height: 1.5;
  word-wrap: break-word;
}

.message.flora .bubble {
  background: #cbd5c0;
  color: var(--text-dark);
  border-bottom-left-radius: 6px;
}

.message.user .bubble {
  background: var(--cream-dark);
  color: var(--text-dark);
  border-bottom-right-radius: 6px;
}

/* Plant image links */
.plant-links {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 4px 16px 8px 56px;
  animation: msgIn 0.3s ease;
}

.plant-link {
  background: var(--white);
  border: 1.5px solid var(--green-pale);
  color: var(--green-deep);
  padding: 8px 14px;
  border-radius: 16px;
  font-family: 'Nunito', sans-serif;
  font-size: 13px;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.15s;
}

.plant-link:hover {
  background: var(--green-lightest);
  border-color: var(--green-mid);
}

/* Quick reply buttons */
.quick-replies {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 4px 16px 12px;
}

.quick-reply-btn {
  background: var(--white);
  border: 2px solid var(--green-pale);
  color: var(--green-deep);
  padding: 10px 18px;
  border-radius: 20px;
  font-family: 'Nunito', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}

.quick-reply-btn:hover {
  background: var(--green-lightest);
  border-color: var(--green-mid);
}

.quick-reply-btn:active {
  background: var(--green-pale);
}

/* Typing indicator */
.typing {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 12px 16px;
  margin-bottom: 12px;
}

.typing .dot {
  width: 8px;
  height: 8px;
  background: var(--green-sage);
  border-radius: 50%;
  animation: bounce 1.2s infinite;
}

.typing .dot:nth-child(2) { animation-delay: 0.15s; }
.typing .dot:nth-child(3) { animation-delay: 0.3s; }

/* ── Input Bar ── */
.input-bar {
  padding: 10px 12px;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
  background: var(--white);
  border-top: 1px solid var(--cream-mid);
  display: flex;
  align-items: flex-end;
  gap: 8px;
  flex-shrink: 0;
}

.input-bar textarea {
  flex: 1;
  border: 2px solid var(--green-pale);
  border-radius: 22px;
  padding: 12px 18px;
  font-family: 'Nunito', sans-serif;
  font-size: 16px;
  color: var(--text-dark);
  background: var(--cream);
  resize: none;
  outline: none;
  max-height: 120px;
  line-height: 1.4;
  transition: border-color 0.2s;
  overflow-y: auto;
  scrollbar-width: none;
  -webkit-appearance: none;
}

.input-bar textarea::-webkit-scrollbar {
  display: none;
}

.input-bar textarea:focus {
  border-color: var(--green-mid);
}

.input-bar textarea::placeholder {
  color: var(--text-light);
}

.photo-btn, .send-btn {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
}

.photo-btn {
  background: var(--cream-dark);
  color: var(--brown-warm);
  font-size: 20px;
}

.photo-btn:hover { background: var(--cream-mid); }

.photo-preview {
  padding: 8px 12px;
  background: var(--white);
  border-top: 1px solid var(--cream-mid);
  display: flex;
  align-items: center;
  gap: 8px;
}

.photo-preview.hidden { display: none; }

.photo-preview img {
  height: 60px;
  border-radius: 10px;
  object-fit: cover;
}

.preview-remove {
  background: var(--cream-dark);
  border: none;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  font-size: 14px;
  cursor: pointer;
  color: var(--text-mid);
}

.preview-identify {
  background: var(--green-deep);
  color: var(--white);
  border: none;
  padding: 8px 16px;
  border-radius: 16px;
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  margin-left: auto;
}

.preview-identify:hover { background: #1E4A2E; }

/* Image in chat */
.bubble img {
  max-width: 100%;
  border-radius: 12px;
  margin-bottom: 4px;
  display: block;
}

.send-btn {
  background: var(--green-deep);
  color: var(--white);
  font-size: 20px;
}

.send-btn:hover { background: #1E4A2E; }
.send-btn:disabled { opacity: 0.4; cursor: default; }

/* ── API Key Modal ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 20px;
}

.modal-overlay.hidden { display: none; }

.modal {
  background: var(--cream);
  border-radius: 20px;
  padding: 30px 24px;
  max-width: 400px;
  width: 100%;
  box-shadow: 0 12px 40px rgba(0,0,0,0.2);
  text-align: center;
}

.modal h3 {
  font-family: 'Playfair Display', serif;
  color: var(--green-deep);
  font-size: 22px;
  margin-bottom: 10px;
}

.modal p {
  font-size: 15px;
  color: var(--text-mid);
  line-height: 1.5;
  margin-bottom: 20px;
}

.modal input {
  width: 100%;
  padding: 14px 16px;
  border: 2px solid var(--green-pale);
  border-radius: 12px;
  font-family: 'Nunito', sans-serif;
  font-size: 15px;
  background: var(--white);
  outline: none;
  margin-bottom: 16px;
  transition: border-color 0.2s;
}

.modal input:focus { border-color: var(--green-mid); }

.modal button {
  background: var(--green-deep);
  color: var(--white);
  border: none;
  padding: 14px 36px;
  border-radius: 25px;
  font-family: 'Nunito', sans-serif;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
}

.modal .error {
  color: #C0392B;
  font-size: 14px;
  margin-top: 8px;
}

/* ── Leaf decorations ── */
.leaf-deco {
  position: absolute;
  opacity: 0.06;
  font-size: 80px;
  pointer-events: none;
  z-index: 0;
}

.leaf-deco.tl { top: 80px; left: -10px; transform: rotate(-30deg); }
.leaf-deco.br { bottom: 100px; right: -10px; transform: rotate(20deg); }

/* ── Animations ── */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-6px); }
}

/* ── Desktop ── */
@media (min-width: 500px) {
  .app {
    height: 95dvh;
    margin-top: 2.5dvh;
    border-radius: 24px;
    box-shadow: 0 8px 40px rgba(45,90,61,0.15);
    overflow: hidden;
  }
}
</style>
</head>
<body>

<div class="app">
  <div class="leaf-deco tl">🌿</div>
  <div class="leaf-deco br">🍃</div>

  <div class="header">
    <button class="reset-btn" id="resetBtn" title="Start fresh">🌱 New</button>
    <h1>Ask Flora</h1>
    <button class="snap-btn" id="headerSnapBtn" title="Snap to identify">🔍 Identify</button>
  </div>

  <!-- Welcome Screen -->
  <div class="welcome" id="welcome">
    <div class="welcome-avatar"><img src="flora.png" alt="Flora"></div>
    <h2>Hi, I'm Flora!</h2>
    <p>Your gardening friend. I'll get to know your garden and help you grow things you'll love.</p>
    <button class="start-btn" id="startBtn">Start chatting</button>
    <button class="plantid-welcome-btn" id="plantIdWelcomeBtn">🔍 Identify</button>
  </div>

  <!-- Chat -->
  <div class="chat-container" id="chatContainer">
    <div class="messages" id="messages"></div>
    <div id="quickReplies" class="quick-replies"></div>
    <div class="photo-preview hidden" id="photoPreview">
      <img id="previewImg" src="">
      <button class="preview-identify" id="previewIdentify">🔍 Identify this</button>
      <button class="preview-remove" id="previewRemove">✕</button>
    </div>
    <div class="input-bar">
      <input type="file" id="photoInput" accept="image/*" style="display:none">
      <input type="file" id="plantIdInput" accept="image/*" capture="environment" style="display:none">
      <button class="photo-btn" id="photoBtn" title="Send a photo">📷</button>
      <textarea id="userInput" rows="1" placeholder="Type your message..."></textarea>
      <button class="send-btn" id="sendBtn" title="Send">➤</button>
    </div>
  </div>
</div>

<!-- No API key needed - proxied through Worker -->

<script>
// Garden profile tracks what Flora has learned
let gardenProfile = {
  name: null,
  location: null,
  gardenType: null,
  sunShade: null,
  soilType: null,
  goals: null,
  existingPlants: null,
  personalNotes: []
};

function buildSystemPrompt() {
  const known = [];
  const unknown = [];

  if (gardenProfile.name) known.push(`Name: ${gardenProfile.name}`);

  if (gardenProfile.gardenType) known.push(`Growing space: ${gardenProfile.gardenType}`);
  else unknown.push('what growing space they have (ask something like "So what are you working with? A garden, an allotment, a windowsill, or something else?" - don\'t assume they have outdoor space)');

  // Only ask outdoor-specific questions if they have outdoor space
  const hasOutdoor = gardenProfile.gardenType && !['indoor only', 'windowsill', 'houseplants only'].includes(gardenProfile.gardenType);

  if (hasOutdoor) {
    if (gardenProfile.location) known.push(`Location: ${gardenProfile.location}`);
    else unknown.push('whereabouts in the UK their garden is (town, county or postcode)');

    if (gardenProfile.sunShade) known.push(`Sun/shade: ${gardenProfile.sunShade}`);
    else unknown.push('sun or shade conditions');

    if (gardenProfile.soilType) known.push(`Soil: ${gardenProfile.soilType}`);
    else unknown.push('soil type (clay, sandy, chalky, loamy, or not sure)');
  } else if (gardenProfile.gardenType) {
    // Indoor grower - ask about light and window direction instead
    if (gardenProfile.sunShade) known.push(`Light: ${gardenProfile.sunShade}`);
    else unknown.push('how much light they get (which way do their windows face, how bright is it)');
  } else {
    // Don't know yet - skip these until we know the space
  }

  if (gardenProfile.goals) known.push(`Goals: ${gardenProfile.goals}`);
  else unknown.push('what they want from their garden (flowers, veg, wildlife, low maintenance, nice space)');

  if (gardenProfile.existingPlants) known.push(`Existing plants: ${gardenProfile.existingPlants}`);
  else unknown.push('anything already growing');

  if (!gardenProfile.name) unknown.push('their name (tag it casually onto the end of a response, like "...by the way, what should I call you?")');

  if (gardenProfile.personalNotes.length) known.push(`Personal: ${gardenProfile.personalNotes.join('; ')}`);

  const knownSection = known.length
    ? `WHAT YOU ALREADY KNOW (never ask about these again):\n${known.join('\n')}`
    : 'You don\'t know anything about this person\'s garden yet.';

  const unknownSection = unknown.length
    ? `THINGS YOU DON'T KNOW YET (fill these in naturally when relevant, NOT as a checklist):\n${unknown.join('\n')}\n\nDO NOT work through this list mechanically. Only ask about something when it would genuinely help you give better advice on what the user is currently asking about. If they want help with moles, ask about their lawn, not their windowsills. If they want to identify a plant, just identify it. Help first, profile later.`
    : 'You have all the basics! Now just be helpful and give tailored advice.';

return `You are Flora, a warm, friendly, and knowledgeable gardening companion in a mobile app called "Ask Flora". You are chatting with someone in the UK.

CRITICAL RULES:
- YOUR PRIMARY JOB IS TO HELP WITH WHAT THE USER ASKED. Answer their question first. Always. Profile-building is secondary and should happen naturally, not as an interrogation.
- Only ask profile questions when they're RELEVANT to the current topic. If someone asks about moles, ask about their lawn. Don't ask about indoor light or what flowers they like.
- Never invent or assume interests the user hasn't expressed. If YOU mentioned wildlife in your greeting, that doesn't mean THEY'RE interested in wildlife.
- 3-5 sentences is fine for a proper answer. Still no essays though.
- Don't dump everything you know into one message. A real friend gives you a bit, waits for your reaction, then gives you more. If someone asks about moles, mention one approach and ask if that appeals before listing three more. Spread the knowledge across the conversation, don't front-load it. Short punchy responses that invite a reply are better than comprehensive walls of text.
- Ask only ONE question per message, and only if it's relevant to what you're currently discussing.
- Never ask permission to ask a question. Just ask it directly.
- When someone shares something personal (a family member, a health condition, a life situation, why something matters to them), acknowledge it warmly BEFORE giving advice. "My autistic son loves sunflowers" deserves more than jumping straight to pot sizes. Pause on the human moment. Something like "Oh, he's got brilliant taste! There's something magical about watching a giant sunflower grow. Let's get him some really special ones." Then move to the practical advice. Never assume ages or make assumptions about people's circumstances. If it would help you give better advice, ask naturally. "Does he get involved in the garden?" or "Would he enjoy growing them from seed?" The personal connection comes first, always.
- If someone questions your identification or advice, don't be sycophantic about it. Don't say "You're absolutely right to question me!" Just be honest and casual. "Hmm, there's always a chance..." or "Moths are tricky, to be fair..." or "Good point, it could be..." Be real, not performatively humble.
- If the user ignores or skips a question, drop it. Don't repeat the same question or tag it onto the next message. You can try again naturally much later in the conversation, but never push. Read the room.
- Never say "As an AI" unprompted. But if someone asks "are you an AI?" or "are you real?" be completely honest and warm about it. Something like: "Yes! I'm powered by AI, but everything I tell you is based on real gardening knowledge and tailored to your actual garden. Think of me as a gardening friend with a very good memory and no allotment to distract me from helping you." Don't be defensive or apologetic about it. Be proud and playful.
- Avoid em dashes. Use commas or full stops instead.
- No emojis unless the user uses them first.
- No bullet points or lists. Just talk naturally.
- Mirror the user's language. If they're casual, be casual.
- Vary your sentence openers. Don't start every response with an exclamation like "Brilliant!" or "Perfect!" or "Lovely!" Mix it up. Sometimes just answer directly. Sometimes start with the advice. A real person doesn't applaud every answer before responding.
- Go easy on exclamation marks. One per message at most, and not every message needs one. Overusing them makes you sound manic. Full stops are fine. "South-facing is ideal for sunflowers." reads better than "Brilliant! South-facing is sunflower heaven!"
- Vary your sentence openings. Don't start every response with an exclamation like "Brilliant!" or "Perfect!" or "Lovely!" Mix it up. Sometimes just answer directly. Sometimes start with the advice. A real person doesn't applaud every answer.
- Don't "dead end" the conversation two messages in a row. If your last message didn't end with a question or suggestion, this one should. A related tip, a follow-up question, or even just "fancy trying anything else?" keeps things flowing. You're a friend having a chat, not a helpdesk closing tickets.
- When the conversation is winding down naturally (user says thanks, bye, cheers etc), remind them you're always here. Something like "You know where I am if you need me!" or "Come back any time, I'll remember everything." Keep it warm and brief, not needy.
- During onboarding, when acknowledging an answer keep it brief ("Lovely!" or "Nice one.") then move to the next question.

PERSONALITY:
- Warm, encouraging, gently funny, never patronising.
- Match the user's humour. If they're being funny, be funny back. If they're dry and sarcastic, match that energy. If they're earnest, be warm and straight.
- When giving advice, sprinkle in related tips or suggestions they didn't ask for but might love. "While you're at it, nasturtiums next to your beans will keep the blackfly off." or "If you like that, you'd probably love growing some sweet peas up that fence too." This is what a knowledgeable friend does naturally. Don't force it every time, but when something genuinely connects, share it.
- After identifying, recommending, or discussing specific plants, naturally offer care tips if you haven't already given them. "Want some tips on keeping it happy?" or "I can talk you through looking after those if you like." Don't do it every time, but a knowledgeable friend would naturally offer to share what they know. If someone's just bought something or is about to plant something, that's the perfect moment.
- When you know their name, use it occasionally and naturally. Maybe once every 3-4 messages. Don't use it every message or you'll sound like a cold caller.

${knownSection}

${unknownSection}

GARDENING KNOWLEDGE:
- Deep knowledge of UK gardening: climate, soil, seasonal timing, pests, companion planting.
- Both ornamental and veg/fruit. Allotment culture.
- Houseplants, indoor growing, balcony and windowsill gardening, succulents, cacti, the lot. If it grows, you know about it.
- You CAN see photos when users send them. Identify plants, trees, shrubs, flowers, insects, birds, fungi, garden wildlife, diseases, and anything else garden-related. Never say you can't see images.
- You CAN show users what things look like. When you mention specific plants, tools, products, or anything visual, tappable image links appear below your message automatically. If someone asks to see something, include it in your plants array and tell them to tap the link below. This works for EVERYTHING - plants, mole traps, garden tools, fertilisers, pots, whatever. Never say you can't show photos or images.
- Practical, actionable, suited to experience level.

TODAY'S DATE: ${new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}

RESPONSE FORMAT:
You MUST respond with valid JSON only. No markdown, no backticks, no preamble.
{
  "message": "Your conversational response here",
  "quickReplies": ["Option 1", "Option 2"],
  "plants": ["Plant Name 1", "Plant Name 2"]
}

quickReplies: 2-4 short tappable answers relevant to what you just asked. Under 6 words each.
ONLY include quick replies if your message ends with a direct question that has clear short answers. If your message is advice, a comment, or an open-ended question, use an empty array [].
Use quick replies for simple either/or questions (sunny vs shady, back garden vs allotment, yes vs no).
Use an EMPTY array [] when: giving advice, making a comment, asking about what they want to grow, what's already in the garden, anything personal, or any question where a richer typed answer would help you give better advice.

plants: Include anything the user might want to see images of - plants, flowers, trees, tools, traps, products, garden equipment, insects, anything. The user will see tappable links to view photos. Use clear descriptive names. Use an empty array [] when there's nothing visual to show.`;
}

// After each exchange, try to extract profile info from the conversation
function updateProfile(userMsg, floraMsg) {
  // Extract text from content (might be string or array of blocks)
  let rawText;
  if (typeof userMsg === 'string') rawText = userMsg;
  else if (Array.isArray(userMsg)) rawText = userMsg.filter(b => b.type === 'text').map(b => b.text).join(' ');
  else return;
  const msg = rawText.toLowerCase();

  // Name detection
  if (!gardenProfile.name) {
    const namePatterns = [
      /(?:i'm|i am|my name is|my name's|it's|its|call me|they call me)\s+([A-Z][a-z]+)/i,
      /^([A-Z][a-z]{1,15})[\s!.,]*$/  // Single word response starting with capital
    ];
    for (const p of namePatterns) {
      const match = rawText.match(p);
      if (match) { gardenProfile.name = match[1]; break; }
    }
  }

  // Garden type
  if (!gardenProfile.gardenType) {
    if (msg.includes('back garden')) gardenProfile.gardenType = 'back garden';
    else if (msg.includes('allotment')) gardenProfile.gardenType = 'allotment';
    else if (msg.includes('patio') || msg.includes('balcony')) gardenProfile.gardenType = 'patio/balcony';
    else if (msg.includes('bit of everything') || msg.includes('both')) gardenProfile.gardenType = 'mixed (garden + allotment)';
    else if (msg.includes('windowsill') || msg.includes('window sill') || msg.includes('window ledge')) gardenProfile.gardenType = 'windowsill';
    else if (msg.includes('indoor') || msg.includes('inside') || msg.includes('flat') || msg.includes('apartment') || msg.includes('houseplant') || msg.includes('house plant')) gardenProfile.gardenType = 'indoor only';
    else if (msg.includes('front garden')) gardenProfile.gardenType = 'front garden';
    else if (msg.includes('courtyard')) gardenProfile.gardenType = 'courtyard';
    else if (msg.includes('my garden') || msg.includes('the garden') || msg.includes('my lawn') || msg.includes('the lawn') || msg.includes('my yard') || msg.includes('flower bed') || msg.includes('my border')) gardenProfile.gardenType = 'garden';
    else if (msg.includes('lawn') || msg.includes('fence') || msg.includes('shed') || msg.includes('deck') || msg.includes('raised bed') || msg.includes('compost bin') || msg.includes('greenhouse')) gardenProfile.gardenType = 'garden';
  }

  // Sun/shade
  if (!gardenProfile.sunShade) {
    if (msg.includes('sunny') || msg.includes('full sun') || msg.includes('south')) gardenProfile.sunShade = 'mostly sunny';
    else if (msg.includes('shady') || msg.includes('shade') || msg.includes('north')) gardenProfile.sunShade = 'mostly shady';
    else if (msg.includes('mix') || msg.includes('partial') || msg.includes('bit of both')) gardenProfile.sunShade = 'mixed sun and shade';
  }

  // Soil
  if (!gardenProfile.soilType) {
    if (msg.includes('clay')) gardenProfile.soilType = 'clay';
    else if (msg.includes('sandy')) gardenProfile.soilType = 'sandy';
    else if (msg.includes('chalk')) gardenProfile.soilType = 'chalky';
    else if (msg.includes('loam')) gardenProfile.soilType = 'loamy';
  }

  // Goals
  if (!gardenProfile.goals) {
    const goals = [];
    if (msg.includes('veg') || msg.includes('vegetable') || msg.includes('grow my own') || msg.includes('food')) goals.push('growing veg');
    if (msg.includes('flower') || msg.includes('colour') || msg.includes('color')) goals.push('flowers and colour');
    if (msg.includes('attract wildlife') || msg.includes('attract bee') || msg.includes('attract bird') || msg.includes('pollinator') || msg.includes('wildlife garden') || msg.includes('wildlife friendly')) goals.push('wildlife');
    if (msg.includes('low maintenance') || msg.includes('easy')) goals.push('low maintenance');
    if (msg.includes('sit') || msg.includes('relax') || msg.includes('nice space')) goals.push('nice space to enjoy');
    if (goals.length) gardenProfile.goals = goals.join(', ');
  }

  // Location
  if (!gardenProfile.location) {
    if (msg.includes('in the garden') || msg.includes("i'm outside")) gardenProfile.location = 'in garden (GPS pending)';
    else if (msg.includes('indoors') || msg.includes('in the house') || msg.includes('inside')) gardenProfile.location = 'indoors (no GPS)';
    // Check for UK regions
    const regions = ['london', 'kent', 'surrey', 'essex', 'sussex', 'norfolk', 'suffolk', 'devon', 'cornwall', 'yorkshire', 'lancashire', 'manchester', 'birmingham', 'bristol', 'scotland', 'wales', 'midlands', 'north', 'south east', 'east anglia'];
    for (const r of regions) {
      if (msg.includes(r)) { gardenProfile.location = r; break; }
    }
  }

  // Existing plants
  if (!gardenProfile.existingPlants) {
    if (msg.includes('nothing') || msg.includes('starting fresh') || msg.includes('bare') || msg.includes('empty')) {
      gardenProfile.existingPlants = 'starting fresh';
    }
    // If they mention specific plants after being asked
    const plantWords = ['rose', 'lavender', 'tomato', 'herb', 'apple', 'lawn', 'hedge', 'tree', 'shrub', 'bush', 'climber', 'wisteria', 'clematis', 'hydrangea', 'dahlia', 'bean', 'potato', 'courgette', 'raspberry', 'strawberry', 'rhubarb'];
    const found = plantWords.filter(p => msg.includes(p));
    if (found.length) gardenProfile.existingPlants = found.join(', ');
  }
}

let conversationHistory = [];
let isGenerating = false;

// Persistence
function saveState() {
  localStorage.setItem('flora_profile', JSON.stringify(gardenProfile));
  // Strip base64 image data before saving (too large for localStorage)
  const lightHistory = conversationHistory.map(m => {
    if (Array.isArray(m.content)) {
      return {
        ...m,
        content: m.content.map(block =>
          block.type === 'image' ? { type: 'text', text: '[Photo shared]' } : block
        )
      };
    }
    return m;
  });
  localStorage.setItem('flora_history', JSON.stringify(lightHistory));
}

function loadState() {
  try {
    const p = localStorage.getItem('flora_profile');
    const h = localStorage.getItem('flora_history');
    if (p) gardenProfile = JSON.parse(p);
    if (h) conversationHistory = JSON.parse(h);
    return conversationHistory.length > 0;
  } catch (e) { return false; }
}

function resetState() {
  gardenProfile = { name: null, location: null, gardenType: null, sunShade: null, soilType: null, goals: null, existingPlants: null, personalNotes: [] };
  conversationHistory = [];
  localStorage.removeItem('flora_profile');
  localStorage.removeItem('flora_history');
}

// Elements
const welcome = document.getElementById('welcome');
const startBtn = document.getElementById('startBtn');
const chatContainer = document.getElementById('chatContainer');
const messagesEl = document.getElementById('messages');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const quickReplies = document.getElementById('quickReplies');
const headerSnapBtn = document.getElementById('headerSnapBtn');
const photoBtn = document.getElementById('photoBtn');
const photoInput = document.getElementById('photoInput');
const photoPreview = document.getElementById('photoPreview');
const previewImg = document.getElementById('previewImg');
const previewRemove = document.getElementById('previewRemove');

let pendingImage = null; // { base64, mediaType }

// Start chat
startBtn.addEventListener('click', () => {
  welcome.style.display = 'none';
  chatContainer.classList.add('active');
  headerSnapBtn.classList.add('visible');
  sendFloraOpener();
});

// Reset / new conversation
document.getElementById('resetBtn').addEventListener('click', () => {
  if (!confirm('Start a fresh conversation? Flora will forget everything about your garden.')) return;
  resetState();
  messagesEl.innerHTML = '';
  quickReplies.innerHTML = '';
  chatContainer.classList.remove('active');
  headerSnapBtn.classList.remove('visible');
  welcome.style.display = '';
});

// Restore previous session
try {
  if (loadState()) {
    welcome.style.display = 'none';
    chatContainer.classList.add('active');
    headerSnapBtn.classList.add('visible');
    conversationHistory.forEach(msg => {
      if (msg.hidden || msg.content.startsWith('Hi! I just opened the app')) return;
      let displayText;
      if (Array.isArray(msg.content)) {
        displayText = msg.content.filter(b => b.type === 'text').map(b => b.text).join(' ');
      } else {
        displayText = msg.content;
      }
      if (displayText) addBubble(displayText, msg.role === 'assistant' ? 'flora' : 'user');
    });
    scrollToBottom();
  }
} catch (e) {
  console.error('Restore failed:', e);
  resetState();
}

// Auto-resize textarea
userInput.addEventListener('input', () => {
  userInput.style.height = 'auto';
  userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
});

// Photo handling
photoBtn.addEventListener('click', () => photoInput.click());

const plantIdInput = document.getElementById('plantIdInput');
const plantIdWelcomeBtn = document.getElementById('plantIdWelcomeBtn');
const previewIdentify = document.getElementById('previewIdentify');

headerSnapBtn.addEventListener('click', () => {
  plantIdInput.click();
});

plantIdWelcomeBtn.addEventListener('click', () => {
  welcome.style.display = 'none';
  chatContainer.classList.add('active');
  headerSnapBtn.classList.add('visible');
  // Don't send opener - go straight to camera. Flora will introduce herself in the ID response.
  plantIdInput.click();
});

plantIdInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    const maxDim = 1024;
    let w = img.width, h = img.height;
    if (w > maxDim || h > maxDim) {
      if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
      else { w = Math.round(w * maxDim / h); h = maxDim; }
    }
    canvas.width = w;
    canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
    const base64 = dataUrl.split(',')[1];
    // Immediately send with plant ID intent
    pendingImage = { base64, mediaType: 'image/jpeg' };
    const imgHtml = `<img src="${dataUrl}">`;
    addBubble(imgHtml + 'What is this?', 'user', true);
    const isFirstMsg = conversationHistory.length === 0;
    const idText = isFirstMsg
      ? 'This is my first time using the app. Can you identify this for me? It might be a plant, tree, flower, insect, or anything garden-related. Tell me what it is and any useful info. Introduce yourself briefly too!'
      : 'Can you identify this for me? It might be a plant, tree, flower, insect, or anything garden-related. Tell me what it is and any useful info about it.';
    const content = [
      { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: base64 } },
      { type: 'text', text: idText }
    ];
    pendingImage = null;
    conversationHistory.push({ role: 'user', content });
    callFlora();
  };
  img.src = URL.createObjectURL(file);
  plantIdInput.value = '';
});

photoInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;

  // Resize image to keep API payload manageable
  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    const maxDim = 1024;
    let w = img.width, h = img.height;
    if (w > maxDim || h > maxDim) {
      if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
      else { w = Math.round(w * maxDim / h); h = maxDim; }
    }
    canvas.width = w;
    canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
    const base64 = dataUrl.split(',')[1];
    pendingImage = { base64, mediaType: 'image/jpeg' };
    previewImg.src = dataUrl;
    photoPreview.classList.remove('hidden');
    userInput.placeholder = 'Add a message about this photo...';
    userInput.focus();
  };
  img.src = URL.createObjectURL(file);
  photoInput.value = '';
});

previewRemove.addEventListener('click', () => {
  pendingImage = null;
  photoPreview.classList.add('hidden');
  userInput.placeholder = 'Type your message...';
});

previewIdentify.addEventListener('click', () => {
  if (!pendingImage || isGenerating) return;
  const dataUrl = `data:${pendingImage.mediaType};base64,${pendingImage.base64}`;
  addBubble(`<img src="${dataUrl}">What is this?`, 'user', true);
  const content = [
    { type: 'image', source: { type: 'base64', media_type: pendingImage.mediaType, data: pendingImage.base64 } },
    { type: 'text', text: 'Can you identify this for me? It might be a plant, tree, flower, insect, or anything garden-related. Tell me what it is and any useful info about it.' }
  ];
  pendingImage = null;
  photoPreview.classList.add('hidden');
  userInput.placeholder = 'Type your message...';
  conversationHistory.push({ role: 'user', content });
  callFlora();
});

// Send message
sendBtn.addEventListener('click', sendMessage);
userInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function sendMessage(text) {
  const msg = (typeof text === 'string' && text) ? text : userInput.value.trim();
  if ((!msg && !pendingImage) || isGenerating) return;

  // Clear quick replies
  quickReplies.innerHTML = '';

  // Build display bubble
  if (pendingImage) {
    const imgHtml = `<img src="data:${pendingImage.mediaType};base64,${pendingImage.base64}">`;
    addBubble(imgHtml + (msg || ''), 'user', true);
  } else {
    addBubble(msg, 'user');
  }

  // Build API content
  let content;
  if (pendingImage) {
    content = [];
    content.push({
      type: 'image',
      source: { type: 'base64', media_type: pendingImage.mediaType, data: pendingImage.base64 }
    });
    content.push({ type: 'text', text: msg || 'What can you tell me about this?' });
  } else {
    content = msg;
  }

  userInput.value = '';
  userInput.style.height = 'auto';
  userInput.placeholder = 'Type your message...';
  pendingImage = null;
  photoPreview.classList.add('hidden');

  conversationHistory.push({ role: 'user', content });
  callFlora();
}

function sendFloraOpener() {
  conversationHistory = [];
  callFlora(true);
}

async function callFlora(isOpener = false) {
  isGenerating = true;
  sendBtn.disabled = true;

  // Show typing
  const typingEl = document.createElement('div');
  typingEl.className = 'typing';
  typingEl.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  messagesEl.appendChild(typingEl);
  scrollToBottom();

  const messages = isOpener
    ? [{ role: 'user', content: 'Hi! I just opened the app. Greet me briefly and ask what I need help with. Mention you can help with gardens, houseplants, pests, lawn care, garden design, plant ID - anything outdoors or green.' }]
    : conversationHistory;

  try {
    const resp = await fetch('https://flora-api.viralto.workers.dev', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 500,
        system: buildSystemPrompt(),
        messages: messages.map(m => ({ role: m.role, content: m.content }))
      })
    });

    const data = await resp.json();

    if (data.error) {
      typingEl.remove();
      addBubble('Sorry, I seem to be having a moment! (' + (data.error.message || data.error.type || 'unknown error') + ')', 'flora');
      console.error('API error:', data.error);
      console.error('System prompt length:', buildSystemPrompt().length);
      isGenerating = false;
      sendBtn.disabled = false;
      return;
    }

    const reply = data.content.map(c => c.text || '').join('');

    // If opener, also push the synthetic user message to history
    if (isOpener) {
      conversationHistory.push({ role: 'user', content: 'Hi! I just opened the app. Greet me briefly and ask what I need help with. Mention you can help with gardens, houseplants, pests, lawn care, garden design, plant ID - anything outdoors or green.', hidden: true });
    }

    // Parse JSON response
    let floraMsg = reply;
    let qrOptions = [];
    let plantLinks = [];
    try {
      const cleaned = reply.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(cleaned);
      floraMsg = parsed.message || reply;
      qrOptions = parsed.quickReplies || [];
      plantLinks = parsed.plants || [];
    } catch (e) {
      try {
        const jsonMatch = reply.match(/\{[\s\S]*"message"\s*:[\s\S]*\}/);
        if (jsonMatch) {
          const parsed = JSON.parse(jsonMatch[0]);
          floraMsg = parsed.message || reply;
          qrOptions = parsed.quickReplies || [];
          plantLinks = parsed.plants || [];
        } else {
          floraMsg = reply;
        }
      } catch (e2) {
        floraMsg = reply;
      }
    }

    conversationHistory.push({ role: 'assistant', content: floraMsg });

    // Update garden profile from this exchange
    const lastUserMsg = conversationHistory.filter(m => m.role === 'user').pop();
    if (lastUserMsg) updateProfile(lastUserMsg.content, floraMsg);

    // Persist
    saveState();

    typingEl.remove();
    addBubble(floraMsg, 'flora');

    // Show plant image links
    if (plantLinks.length > 0) {
      showPlantLinks(plantLinks);
    }

    // Show contextual quick replies from Flora
    if (qrOptions.length > 0) {
      showQuickReplies(qrOptions);
    }

  } catch (err) {
    typingEl.remove();
    addBubble('Hmm, I can\'t seem to connect. (' + err.message + ')', 'flora');
    console.error(err);
  }

  isGenerating = false;
  sendBtn.disabled = false;
}

function addBubble(text, who, isHtml = false) {
  const msgDiv = document.createElement('div');
  msgDiv.className = `message ${who}`;

  if (who === 'flora') {
    const avatar = document.createElement('div');
    avatar.className = 'flora-avatar';
    avatar.innerHTML = '<img src="flora.png" alt="Flora">';
    msgDiv.appendChild(avatar);
  }

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (isHtml) {
    bubble.innerHTML = text;
  } else {
    bubble.textContent = text;
  }

  msgDiv.appendChild(bubble);
  messagesEl.appendChild(msgDiv);
  scrollToBottom();
}

function showPlantLinks(plants) {
  const container = document.createElement('div');
  container.className = 'plant-links';
  plants.forEach(name => {
    const link = document.createElement('a');
    link.className = 'plant-link';
    link.href = `https://www.google.com/search?tbm=isch&q=${encodeURIComponent(name)}`;
    link.target = '_blank';
    link.rel = 'noopener';
    link.textContent = '🔎 ' + name;
    container.appendChild(link);
  });
  messagesEl.appendChild(container);
  scrollToBottom();
}

function showQuickReplies(options) {
  quickReplies.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quick-reply-btn';
    btn.textContent = opt;
    btn.addEventListener('click', () => {
      quickReplies.innerHTML = '';
      sendMessage(opt);
    });
    quickReplies.appendChild(btn);
  });
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  });
}
